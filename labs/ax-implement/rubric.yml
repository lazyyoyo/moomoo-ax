# ax-implement 평가 루브릭 (범용)
#
# judge.py 스키마: items: [{question, priority}]
# priority: critical | high | medium | low
#   - critical: No → 즉시 score 0.0
#   - high(3) / medium(2) / low(1): 가중 평균
#
# 평가 대상: labs/ax-implement/script.py 가 stdout 에 출력한 Implementation 마크다운
# 평가자: LLM Judge (judge.py)
#
# 원칙: **fixture-agnostic**.
# 특정 함수명 / API / 엣지 케이스 같은 fixture-specific 판단은
# SPEC.md 의 "완료 기준" 섹션에 위임하고, rubric 은 메타 질문 1개로만 참조한다.
# fixture 가 바뀌어도 이 rubric 은 그대로 재사용 가능해야 한다.

items:
  # ──────────────────── CRITICAL ────────────────────
  # 형식/계약 위반 또는 SPEC 미충족은 즉시 탈락
  - question: "산출물이 '# Implementation:' 헤더로 시작하는가?"
    priority: critical

  - question: "산출물에 'Summary', 'Files', 'Self-check' 3개 섹션이 이 순서로 모두 포함되어 있는가?"
    priority: critical

  - question: "Summary 의 verdict 가 ready, partial, failed 중 하나로 명시되어 있는가? (다른 값이면 No)"
    priority: critical

  - question: "Files 섹션에 최소 1개 이상의 파일이 언어 태그가 있는 단일 펜스 코드 블록으로 포함되어 있는가?"
    priority: critical

  - question: "SPEC.md 의 '완료 기준' 섹션에 나열된 모든 항목을 산출물 코드가 충족하는가? (하나라도 누락/부분 구현이면 No)"
    priority: critical

  - question: "각 코드 블록이 파일 **전체** 를 담고 있는가? (부분/생략/ellipsis '...' 등이 없음)"
    priority: critical

  # ──────────────────── HIGH ────────────────────
  # 오너가 그대로 커밋할 수 있는 품질
  - question: "타입 안전성 — 정적 타입 언어(TS/Python 등)의 경우 any/Any/암시적 any 없이 공개 API 의 파라미터/반환 타입이 명시되어 있고 nullable 이 명확히 표현되어 있는가?"
    priority: high

  - question: "SPEC.md 에 명시된 경계값/엣지 케이스(유효하지 않은 입력, 경계 조건, 빈 입력 등)를 코드가 구조적으로 처리하는가?"
    priority: high

  - question: "산출물이 base/ 디렉토리의 기존 코드 스타일(네이밍 컨벤션, 인덴트, import 스타일, 상수 선언 방식)과 일치하는가?"
    priority: high

  - question: "Self-check 섹션이 SPEC 의 완료 기준 **각 항목에 대해** 충족 여부 + 구체적 근거(함수/분기/줄 범위 등)를 짝지어 제시하는가?"
    priority: high

  - question: "산출물에 코드/섹션 외의 설명문(서론, 결론, '구현을 생성했습니다' 같은 메타 멘트) 이 없는가?"
    priority: high

  - question: "공개 API(export 되는 함수/타입)와 내부 헬퍼가 명확히 구분되어 있는가? (필요 최소한만 export)"
    priority: high

  # ──────────────────── MEDIUM ────────────────────
  # 범용 lint 품질
  - question: "공개 함수 본체가 60줄 이하로 유지되는가? (초과 시 분기/유틸이 헬퍼 함수로 분리되어 있음)"
    priority: medium

  - question: "DRY — 같은 상수값/리터럴(특히 특수 문자 목록, 요일/단위 이름 등)이 코드 전반(정규식/문자열 포함)에서 2회 이상 중복 하드코딩되지 않고 단일 상수에서 참조되는가?"
    priority: medium

  - question: "매직 넘버/매직 문자열이 named constant 또는 Record/Map 로 추출되어 있는가? (오프셋, 인덱스, 특수 기호 등)"
    priority: medium

  - question: "산출물 전체 길이가 적정한가? (너무 짧음 <30줄 또는 지나치게 장황 >400줄 제외)"
    priority: medium

  - question: "산출물 한국어 작성 일관성 — 섹션 헤더는 영어 유지, 설명은 한국어, 코드 주석은 상황에 맞게?"
    priority: medium

  - question: "코드 블록 언어 태그가 파일 확장자와 일치하는가? (.ts → typescript/ts, .py → python/py, .tsx → tsx 등)"
    priority: medium

  - question: "파싱/분기/변환 로직이 early-return 또는 명확한 분기 구조로 가독성 있게 작성되어 있고, 깊은 중첩이 없는가?"
    priority: medium

  # ──────────────────── LOW ────────────────────
  # 있으면 좋은 것
  - question: "상수 이름이 코드 관습(언어별 UPPER_SNAKE / PascalCase / camelCase)을 따르는가?"
    priority: low

  - question: "verdict 가 ready 인 경우, Self-check 의 완료 기준 매핑이 전부 충족(N/N)을 보여주는가?"
    priority: low

  - question: "코드 블록 밖에 있는 설명 문구(Summary 한 줄 요약 등)가 구현 세부를 중복 서술하지 않고 요약 수준으로 간결한가?"
    priority: low
