# base.yml — 고정 루브릭 (MVP v0.1 스켈레톤)
#
# Judge 게이트(④)는 v0.2에서 활성화.
# 여기에 정의된 항목은 모든 프로젝트, 모든 기능에 항상 적용.
# 변경은 루프 1(스프린트 단위)에서만.

version: "0.1"

categories:
  layout:
    - question: "spacing이 디자인 토큰 스케일을 따르는가?"
      critical: false
    - question: "반응형 브레이크포인트가 적용되어 있는가?"
      critical: false

  typography:
    - question: "타이포 계층(h1→h6, body, caption)이 유지되는가?"
      critical: false
    - question: "폰트 크기/무게가 디자인 토큰을 사용하는가?"
      critical: false

  color:
    - question: "텍스트/배경 대비 비율이 WCAG AA를 충족하는가?"
      critical: true
    - question: "하드코딩 색상 대신 디자인 토큰을 사용하는가?"
      critical: false

  component:
    - question: "shadcn/ui 컴포넌트를 우선 사용하는가?"
      critical: false
    - question: "일관된 컴포넌트 패턴을 따르는가?"
      critical: false

  accessibility:
    - question: "인터랙티브 요소에 ARIA 역할/라벨이 있는가?"
      critical: true
    - question: "키보드만으로 주요 기능을 사용할 수 있는가?"
      critical: true

  state:
    - question: "loading 상태가 존재하는가?"
      critical: false
    - question: "empty 상태가 존재하는가?"
      critical: false
    - question: "error 상태가 존재하는가?"
      critical: true

  interaction:
    - question: "호버/포커스/액티브 피드백이 있는가?"
      critical: false
    - question: "트랜지션이 자연스러운가 (200-300ms)?"
      critical: false
